name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      # 1. Kodu çek
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java kur (Gradle için JDK 17 şart)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Godot 4.2.1 indir
      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.1-stable_linux.x86_64.zip
          mv Godot_v4.2.1-stable_linux.x86_64 godot
          chmod +x godot

      # 4. Godot Android export template indir (APK şablonu + android_source.zip içerir)
      - name: Download Android Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip -q Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.1.stable/
          echo "=== TEŞHİS: export_templates klasör içeriği ==="
          ls -la ~/.local/share/godot/export_templates/4.2.1.stable/ | grep -i android
          echo "=== TEŞHİS: android_source.zip var mı, boyutu ne ==="
          find ~/.local/share/godot/export_templates/4.2.1.stable/ -iname "*android*"

      # 5. Android SDK kur + Gradle'ın istediği spesifik NDK/build-tools sürümlerini indir
      #    Godot 4.2 config.gradle sabit değerleri: buildTools 33.0.2, ndk 23.2.8568313
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Required SDK Components
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;23.2.8568313" "cmake;3.10.2.4988404"

      # 6. Debug keystore oluştur (imzalama için)
      - name: Create Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # 7. Godot editor ayarlarını yapılandır (SDK yolu, keystore)
      - name: Configure Godot Android Settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "${{ github.workspace }}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      # 8. Export preset oluştur — GRADLE BUILD AÇIK
      - name: Create Export Presets
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/RoboticPlanet.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=true
          gradle_build/gradle_build_directory=""
          gradle_build/android_source_template=""
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug="${{ github.workspace }}/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          one_click_deploy/clear_previous_install=false
          version/code=1
          version/name="0.2.3"
          package/unique_name="com.roboticplanet.remaster"
          package/name="Robotic Planet Remaster"
          package/signed=true
          package/classify_as_game=true
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          xr_features/hand_tracking=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          EOF

      # 9. Projeyi bir kez editor modunda aç-tara-kapat (ZORUNLU İLK ADIM)
      #    Neden: .godot/ cache klasörü yoksa (her CI checkout'unda öyle),
      #    class_name kayıtları henüz global tabloya işlenmemiş olur ve
      #    sonraki adımlarda "Could not find type X in scope" hatası çıkar.
      #    Bilinen Godot davranışı: godotengine/godot#82392, #81615
      - name: Import Project (populate .godot cache)
        timeout-minutes: 5
        run: |
          timeout 240 ./godot --headless --editor --quit --path . || true
          echo "✓ .godot cache durumu:"
          ls -la .godot/ 2>/dev/null || echo "⚠ .godot/ klasörü oluşmadı!"

      # 10. Gradle build template'i projeye kur
      #    ÖNCE resmi CLI flag'i denenir (3 kez test edildi, sessizce başarısız oluyor,
      #    muhtemelen GUI onay diyaloğu bekliyor, headless'ta çalışmıyor).
      #    Flag işe yaramazsa YEDEK: android_source.zip'i manuel çıkar.
      - name: Install Android Build Template
        timeout-minutes: 5
        run: |
          timeout 240 ./godot --headless --install-android-build-template --quit || true

          if [ -d "android/build" ] && [ -f "android/build/build.gradle" ]; then
            echo "✓ CLI flag işe yaradı, android/build hazır"
          else
            echo "⚠ CLI flag işe yaramadı, manuel çıkarma deneniyor..."
            SOURCE_ZIP=~/.local/share/godot/export_templates/4.2.1.stable/android_source.zip

            echo "=== TEŞHİS: android_source.zip içeriği (ilk 20 satır) ==="
            unzip -l "$SOURCE_ZIP" | head -20

            rm -rf android/build
            mkdir -p android
            unzip -q "$SOURCE_ZIP" -d android/build_extracted

            echo "=== TEŞHİS: çıkarma sonrası klasör yapısı ==="
            find android/build_extracted -maxdepth 3 -type d

            # Eğer build.gradle bir alt klasördeyse (örn. build_extracted/build/build.gradle),
            # doğru klasörü android/build olarak taşı
            if [ -f "android/build_extracted/build.gradle" ]; then
              mv android/build_extracted android/build
            elif [ -f "android/build_extracted/build/build.gradle" ]; then
              mv android/build_extracted/build android/build
              rm -rf android/build_extracted
            else
              echo "❌ build.gradle hiçbir yerde bulunamadı, yapı beklenenden farklı"
              find android/build_extracted -name "build.gradle"
            fi
            touch android/.gdignore 2>/dev/null || true
          fi

          echo "=== SONUÇ: android/build durumu ==="
          if [ -d "android/build" ] && [ -f "android/build/build.gradle" ]; then
            ls -la android/build
            echo "✓ android/build/build.gradle mevcut, devam ediliyor"
          else
            echo "❌ android/build/build.gradle bulunamadı, build başarısız olacak"
            exit 1
          fi

      # 11. Build klasörü oluştur
      - name: Create Build Directory
        run: mkdir -p build

      # 12. APK build et (Gradle bu adımda arka planda çalışır, süre uzayabilir)
      - name: Build APK
        timeout-minutes: 15
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          ./godot --headless --export-debug "Android" build/RoboticPlanet.apk

      # 12. APK'yı artifact olarak kaydet (indirilebilir)
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RoboticPlanet-APK
          path: build/RoboticPlanet.apk
          retention-days: 30
          if-no-files-found: warn

      # 13. Hata olursa Gradle loglarını da yükle (teşhis için)
      - name: Upload Gradle Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            android/build/**/build/outputs/logs/**
            android/.gradle/**/*.log
          if-no-files-found: ignore

      # 14. Build başarılıysa özet göster
      - name: Build Summary
        run: |
          if [ -f "build/RoboticPlanet.apk" ]; then
            SIZE=$(du -sh build/RoboticPlanet.apk | cut -f1)
            echo "✅ APK başarıyla oluşturuldu (Gradle build)!"
            echo "📦 Boyut: $SIZE"
            echo "📍 Konum: build/RoboticPlanet.apk"
          else
            echo "❌ APK oluşturulamadı!"
            exit 1
          fi
